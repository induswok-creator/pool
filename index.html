<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CueCloud POS · PIN + Firestore</title>
    <style>
      :root {
        --ink: #17211d;
        --muted: #6d7973;
        --green: #12674b;
        --green2: #0b8d60;
        --mint: #e7f5ee;
        --line: #dce3de;
        --red: #bd3c39;
        --amber: #e2a52b;
        --shadow: 0 10px 30px #183c2d13;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f6f8f5;
        color: var(--ink);
        font:
          14px/1.5 Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }
      button,
      input,
      select {
        font: inherit;
      }
      button {
        border: 1px solid var(--line);
        background: #fff;
        padding: 9px 13px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        color: var(--ink);
      }
      button:hover {
        border-color: #9fafa6;
      }
      .primary {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .primary:hover {
        background: var(--green2);
      }
      .danger {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }
      .small {
        padding: 5px 8px;
        font-size: 11px;
      }
      .wide {
        width: 100%;
      }
      header {
        height: 68px;
        background: #10231c;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 25px;
        padding: 0 3vw;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .brand {
        font-size: 20px;
        white-space: nowrap;
      }
      .brand i {
        color: #68d4a7;
        font-style: normal;
      }
      .brand b {
        font-size: 10px;
        background: #d6b557;
        color: #17211d;
        padding: 3px 5px;
        border-radius: 4px;
      }
      nav {
        display: flex;
        flex: 1;
        gap: 2px;
        overflow: auto;
      }
      nav button {
        background: transparent;
        border: 0;
        color: #b8c9c1;
        white-space: nowrap;
      }
      nav button:hover,
      nav button.active {
        background: #20382f;
        color: #fff;
      }
      .who {
        text-align: right;
        font-size: 11px;
      }
      .who b {
        display: block;
      }
      .who button {
        background: none;
        border: 0;
        color: #6cd3a8;
        padding: 0;
      }
      .hamb {
        display: none;
      }
      main {
        max-width: 1420px;
        margin: auto;
        padding: 32px 3vw 60px;
      }
      .head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        margin-bottom: 23px;
      }
      .head h1 {
        font-size: 31px;
        letter-spacing: -1px;
        margin: 0;
      }
      .head p {
        color: var(--muted);
        margin: 4px 0;
      }
      .eye {
        text-transform: uppercase;
        letter-spacing: 1.4px;
        font-size: 10px !important;
        font-weight: 900;
        color: var(--green) !important;
      }
      .panel,
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
      }
      .panel h2 {
        margin: 0 0 15px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 20px;
      }
      .stats .card {
        margin: 0;
      }
      .stats span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }
      .stats b {
        font-size: 23px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .tablecard {
        border-top: 4px solid #59ad86;
      }
      .tablecard.running {
        border-top-color: var(--amber);
      }
      .tablecard.paused {
        border-top-color: var(--red);
      }
      .tablecard.warning {
        border-color: var(--amber);
        border-top-color: var(--amber);
        background: #fffaf0;
      }
      .tablecard.warning .badge {
        background: #fff0c7;
        color: #8a5a00;
      }
      .tablecard.warning .timer {
        color: #9b6500;
      }
      .tablecard.over {
        border-color: var(--red);
        border-top-color: var(--red);
        background: #fff5f4;
        box-shadow:
          0 0 0 3px #bd3c3920,
          0 10px 30px #bd3c3922;
      }
      .tablecard.over .badge {
        background: #f8dedd;
        color: var(--red);
      }
      .tablecard.over .timer {
        color: var(--red);
      }
      .tabletop {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .ball {
        height: 41px;
        width: 41px;
        border-radius: 50%;
        background: #15241e;
        color: #fff;
        border: 4px solid #d7bc67;
        display: grid;
        place-items: center;
      }
      .tabletop h3 {
        margin: 0;
      }
      .tabletop small,
      .muted {
        color: var(--muted);
      }
      .badge {
        margin-left: auto;
        background: var(--mint);
        color: var(--green);
        padding: 4px 7px;
        border-radius: 20px;
        font-size: 9px;
        font-weight: 900;
      }
      .timer {
        text-align: center;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 2px;
        margin: 18px;
      }
      .actions {
        display: flex;
        justify-content: center;
        gap: 7px;
      }
      .stack {
        display: grid;
        gap: 10px;
      }
      .inline {
        display: flex;
        gap: 9px;
        align-items: end;
        flex-wrap: wrap;
      }
      .inline > * {
        flex: 1;
        min-width: 110px;
      }
      .two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #d8dfda;
        border-radius: 8px;
        background: #fff;
      }
      input:focus,
      select:focus {
        outline: 0;
        border-color: #3d9b76;
        box-shadow: 0 0 0 3px #3d9b7620;
      }
      label {
        font-size: 11px;
        font-weight: 750;
        color: #526059;
      }
      label input,
      label select {
        margin-top: 4px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }
      th {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }
      td {
        padding: 11px 10px;
        border-bottom: 1px solid #edf0ed;
      }
      .scroll {
        overflow: auto;
      }
      .pill {
        background: var(--mint);
        color: var(--green);
        border-radius: 20px;
        padding: 3px 7px;
        font-size: 11px;
      }
      .low {
        color: var(--red);
        font-weight: 800;
      }
      .pos {
        display: grid;
        grid-template-columns: 1fr 385px;
        gap: 20px;
        align-items: start;
      }
      .products {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 11px;
      }
      .product {
        min-height: 125px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
      }
      .product small {
        color: var(--green);
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 1px;
      }
      .product b {
        font-size: 15px;
        margin: 7px 0 auto;
      }
      .product strong {
        font-size: 18px;
      }
      .cart {
        position: sticky;
        top: 85px;
      }
      .cartrow,
      .sumrow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 9px 0;
        border-bottom: 1px solid #edf0ed;
      }
      .qty {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .qty button {
        padding: 2px 7px;
      }
      .total {
        font-size: 20px;
      }
      .sessionitem {
        background: var(--mint);
        padding: 11px;
        border-radius: 9px;
      }
      .qrbox {
        display: none;
        text-align: center;
        background: #fff;
        border: 1px dashed #9eafa6;
        border-radius: 12px;
        padding: 13px;
        margin: 12px 0;
      }
      .qrbox.show {
        display: block;
      }
      .qrbox img {
        width: 190px;
        height: 190px;
        max-width: 100%;
        background: #fff;
        padding: 5px;
      }
      .qrbox b,
      .qrbox small {
        display: block;
      }
      .clientgrid,
      .plans {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .client dl {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: #f7f9f7;
        padding: 10px;
        border-radius: 8px;
      }
      .client dt {
        color: var(--muted);
      }
      .client dd {
        text-align: right;
        margin: 0;
      }
      .dot {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #aaa;
      }
      .dot.on {
        background: #20ad72;
        box-shadow: 0 0 0 4px #20ad7220;
      }
      .dangerzone {
        border-color: #e1aaa8;
        background: #fff9f8;
      }
      .dangerzone h2 {
        color: var(--red);
      }
      details {
        border: 1px solid var(--line);
        border-radius: 10px;
        margin: 10px 0;
        background: #fff;
      }
      summary {
        cursor: pointer;
        padding: 13px;
        font-weight: 800;
      }
      details > div {
        padding: 0 13px 13px;
      }
      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        background: #17211d;
        color: #fff;
        padding: 12px 17px;
        border-radius: 9px;
        z-index: 99;
      }
      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top left, #245440, #0f211a 55%);
        padding: 20px;
      }
      .loginbox {
        width: min(450px, 100%);
        background: #fff;
        padding: 36px;
        border-radius: 18px;
        box-shadow: 0 25px 70px #0005;
      }
      .logo {
        text-align: center;
        color: var(--green);
        font-size: 44px;
      }
      .loginbox h1 {
        text-align: center;
        margin: 3px;
      }
      .demoBtns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
      }
      .notice {
        background: #eff5f1;
        border: 1px solid #d4e2da;
        padding: 11px;
        border-radius: 8px;
        color: #536159;
      }
      .pinDots {
        display: flex;
        justify-content: center;
        gap: 11px;
        margin: 22px;
      }
      .pinDots i {
        width: 14px;
        height: 14px;
        border: 2px solid #8da097;
        border-radius: 50%;
      }
      .pinDots i.on {
        background: var(--green);
        border-color: var(--green);
      }
      .pinpad {
        display: grid;
        grid-template-columns: repeat(3, 72px);
        gap: 11px;
        justify-content: center;
      }
      .pinpad button {
        height: 58px;
        font-size: 21px;
        border-radius: 14px;
      }
      .pinpad .zero {
        grid-column: 2;
      }
      .pinpad .clear {
        grid-column: 1;
        grid-row: 4;
        font-size: 12px;
      }
      .pinpad .back {
        grid-column: 3;
        grid-row: 4;
      }
      .good {
        color: var(--green);
        font-weight: 800;
      }
      .creditdue {
        color: var(--red);
        font-weight: 800;
      }
      .soft {
        background: #f7f9f7;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }
      .actions.wrap {
        flex-wrap: wrap;
        justify-content: flex-start;
      }
      .receipt {
        max-width: 420px;
        margin: auto;
        text-align: center;
      }
      .center {
        text-align: center;
      }
      @media (max-width: 950px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .products {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (max-width: 700px) {
        header {
          height: auto;
          min-height: 60px;
          flex-wrap: wrap;
          padding: 11px 15px;
        }
        .hamb {
          display: block;
          margin-left: auto;
        }
        .who {
          display: none;
        }
        nav {
          display: none;
          flex-basis: 100%;
          flex-wrap: wrap;
        }
        nav.open {
          display: flex;
        }
        main {
          padding: 23px 15px;
        }
        .grid,
        .stats,
        .two,
        .pos,
        .clientgrid,
        .plans {
          grid-template-columns: 1fr;
        }
        .products {
          grid-template-columns: repeat(2, 1fr);
        }
        .cart {
          position: static;
        }
        .head h1 {
          font-size: 26px;
        }
      }
      @media print {
        header,
        .noprint {
          display: none !important;
        }
        main {
          padding: 0;
        }
        .receipt {
          box-shadow: none;
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
      import {
        getAnalytics,
        isSupported,
      } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
      import {
        initializeFirestore,
        persistentLocalCache,
        persistentMultipleTabManager,
        doc,
        getDoc,
        getDocs,
        setDoc,
        onSnapshot,
        collection,
        writeBatch,
      } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
      const firebaseConfig = {
        apiKey: "AIzaSyAbl5NFNRubDexosJEZl89glIC7TwlZ17w",
        authDomain: "clubpool-b71d1.firebaseapp.com",
        projectId: "clubpool-b71d1",
        storageBucket: "clubpool-b71d1.firebasestorage.app",
        messagingSenderId: "180268095919",
        appId: "1:180268095919:web:0134ce1d240fbe490f775a",
        measurementId: "G-0PFCM41911",
      };
      const firebaseApp = initializeApp(firebaseConfig),
        db = initializeFirestore(firebaseApp, {
          localCache: persistentLocalCache({
            tabManager: persistentMultipleTabManager(),
          }),
        }),
        legacyRef = doc(db, "public", "main"),
        clubRef = doc(db, "clubs", "main"),
        A = document.getElementById("app");
      isSupported()
        .then((ok) => {
          if (ok) getAnalytics(firebaseApp);
        })
        .catch(() => {});
      let page = "tables",
        user = null,
        tick = null,
        cart = {},
        pending = null,
        unlocked = false,
        unlockedPinHash = "",
        pinEntry = "",
        developerMode = false,
        secretTaps = 0,
        customerLedgerId = null;
      const seed = () => ({
        club: {
          name: "Demo Cue Club",
          currency: "₹",
          gstEnabled: true,
          gst: 18,
          address: "Andheri West, Mumbai",
          phone: "+91 98765 43210",
          discountEnabled: false,
          defaultDiscount: 0,
          maxDiscount: 20,
          upiId: "",
          payeeName: "Demo Cue Club",
          warningMinutes: 10,
          graceMinutes: 0,
          happyHourEnabled: false,
          happyHourName: "Happy Hour",
          happyHourStart: "16:00",
          happyHourEnd: "19:00",
          happyHourDays: [1, 2, 3, 4, 5],
          happyHourDiscount: 15,
          happyHourScope: "table",
        },
        tables: [1, 2, 3, 4]
          .map((n, i) => ({
            id: "t" + n,
            name: "Snooker Table " + n,
            type: "Snooker",
            active: true,
            order: i + 1,
          }))
          .concat({
            id: "t5",
            name: "Pool Table 1",
            type: "Pool",
            active: true,
            order: 5,
          }),
        rates: ["t1", "t2", "t3", "t4", "t5"].flatMap((t, ti) =>
          ["Singles", "Doubles", "Shuffle", "Cricket"].map((m, i) => ({
            id: t + "r" + i,
            tableId: t,
            mode: m,
            type: "hourly",
            amount: [300, 400, 350, 350][i] + (ti === 4 ? -50 : 0),
          })),
        ),
        sessions: [],
        products: [
          {
            id: "p1",
            name: "Mineral Water",
            category: "Drinks",
            price: 20,
            stock: 24,
            low: 5,
            active: true,
          },
          {
            id: "p2",
            name: "Soft Drink",
            category: "Drinks",
            price: 50,
            stock: 18,
            low: 5,
            active: true,
          },
          {
            id: "p3",
            name: "Tea",
            category: "Drinks",
            price: 30,
            stock: 50,
            low: 10,
            active: true,
          },
          {
            id: "p4",
            name: "Chips",
            category: "Snacks",
            price: 30,
            stock: 15,
            low: 5,
            active: true,
          },
          {
            id: "p5",
            name: "French Fries",
            category: "Snacks",
            price: 120,
            stock: 12,
            low: 3,
            active: true,
          },
          {
            id: "p6",
            name: "Club Sandwich",
            category: "Food",
            price: 180,
            stock: 10,
            low: 3,
            active: true,
          },
        ],
        orders: [
          {
            id: 1001,
            createdAt: new Date().toISOString(),
            customer: "Rahul",
            payment: "UPI",
            subtotal: 500,
            tax: 90,
            total: 590,
            items: [{ name: "Sample sale", qty: 1, price: 500, total: 500 }],
          },
        ],
        expenses: [
          {
            id: 1,
            date: new Date().toISOString(),
            description: "Table cloth cleaning",
            category: "Maintenance",
            amount: 450,
          },
        ],
        clients: [
          {
            id: "c1",
            name: "Demo Cue Club",
            slug: "demo",
            status: "active",
            end: addDays(30),
            plan: "Monthly",
          },
          {
            id: "c2",
            name: "Champion Snooker",
            slug: "champion",
            status: "active",
            end: addDays(180),
            plan: "6 Months",
          },
          {
            id: "c3",
            name: "Break Point Club",
            slug: "breakpoint",
            status: "suspended",
            end: addDays(-3),
            plan: "Expired",
          },
        ],
        membershipPlans: [
          {
            id: "mp1",
            name: "Monthly Player",
            durationDays: 30,
            price: 1200,
            discountPct: 10,
            active: true,
          },
          {
            id: "mp2",
            name: "Quarterly Pro",
            durationDays: 90,
            price: 3000,
            discountPct: 15,
            active: true,
          },
        ],
        customers: [
          {
            id: "cu1",
            name: "Rahul Sharma",
            phone: "9876543210",
            email: "",
            creditLimit: 2000,
            outstanding: 0,
            membershipPlanId: "mp1",
            membershipStart: new Date().toISOString().slice(0, 10),
            membershipEnd: addDays(30),
            membershipStatus: "active",
            notes: "",
            active: true,
            createdAt: new Date().toISOString(),
          },
        ],
        creditLedger: [],
        attendance: [],
      });
      function addDays(d) {
        return new Date(Date.now() + d * 86400000).toISOString().slice(0, 10);
      }
      let D = seed(),
        syncReady = false,
        saving = false;
      const DATA_KEYS = [
        "users",
        "tables",
        "rates",
        "sessions",
        "products",
        "orders",
        "expenses",
        "reservations",
        "auditLogs",
        "stockMovements",
        "customers",
        "membershipPlans",
        "creditLedger",
        "attendance",
      ];
      async function syncArray(key) {
        let ref = collection(db, "clubs", "main", key),
          remote = await getDocs(ref),
          local = new Map((D[key] || []).map((x) => [String(x.id), x])),
          remoteMap = new Map(remote.docs.map((x) => [x.id, x])),
          ops = [];
        remote.docs.forEach((x) => {
          if (!local.has(x.id)) ops.push(["delete", x.ref]);
        });
        local.forEach((x, id) => {
          let old = remoteMap.get(id)?.data();
          if (!old || JSON.stringify(old) !== JSON.stringify(x))
            ops.push(["set", doc(ref, id), x]);
        });
        for (let i = 0; i < ops.length; i += 400) {
          let batch = writeBatch(db);
          ops
            .slice(i, i + 400)
            .forEach((o) =>
              o[0] === "delete" ? batch.delete(o[1]) : batch.set(o[1], o[2]),
            );
          await batch.commit();
        }
      }
      const save = async () => {
          saving = true;
          try {
            await setDoc(clubRef, {
              club: D.club,
              subscription: D.subscription,
              updatedAt: new Date().toISOString(),
            });
            await Promise.all(DATA_KEYS.map(syncArray));
            let day = new Date().toISOString().slice(0, 10);
            if (localStorage.getItem("cuecloud_backup_day") !== day) {
              localStorage.setItem("cuecloud_auto_backup", JSON.stringify(D));
              localStorage.setItem("cuecloud_backup_day", day);
            }
          } catch (e) {
            toast("Cloud save queued/offline: " + e.message);
          } finally {
            saving = false;

          new TextEncoder().encode("cuecloud:" + pin),

          .map((x) => x.toString(16).padStart(2, "0"))
          .join("");

        let a = subscriptionActive();
        shell(
          head(
            "Developer control",
            "Subscription access",
            "Block the club when payment is unpaid, or extend its paid plan.",
          ) +
            `<div class="stats"><div class="card"><span>Status</span><b style="color:${a ? "var(--green)" : "var(--red)"}">${a ? "ACTIVE" : "BLOCKED"}</b></div><div class="card"><span>Access until</span><b>${esc(D.subscription.end)}</b></div><div class="card"><span>Plan</span><b>${esc(D.subscription.plan || "Manual")}</b></div></div><section class="panel"><h2>Subscription controls</h2><div class="actions"><button class="primary" onclick="extendSub(1)">Paid: +1 month</button><button class="primary" onclick="extendSub(6)">Paid: +6 months</button><button class="primary" onclick="extendSub(12)">Paid: +1 year</button><button class="danger" onclick="suspendSub()">Block for non-payment</button></div><p class="notice">Developer access always remains available, even when all normal users are blocked by subscription status.</p></section>`,
        );
      }
      window.extendSub = async (m) => {
        let base = Math.max(
            Date.now(),
            new Date(D.subscription.end + "T23:59:59").getTime(),
          ),
          end = new Date(base + m * 30 * 86400000).toISOString().slice(0, 10);
        D.subscription = {
          status: "active",
          end,
          plan: m === 1 ? "Monthly" : m === 6 ? "6 Months" : "Yearly",
          updatedAt: new Date().toISOString(),
        };
        await save();
        toast("Subscription activated");
        subscription();
      };
      window.suspendSub = async () => {
        if (!confirm("Block all normal users for non-payment?")) return;
        D.subscription.status = "suspended";
        D.subscription.updatedAt = new Date().toISOString();
        await save();
        toast("Normal user access blocked");
        subscription();
      };
      async function boot() {
        A.innerHTML =
          '<div class="login"><section class="loginbox center"><div class="logo">◉</div><h1>CueCloud POS</h1><p class="muted">Connecting to Firestore…</p></section></div>';
        try {
          let settingsSnap = await getDoc(clubRef),
            legacy = await getDoc(legacyRef),
            fresh = seed(),
            hasV2 = settingsSnap.exists();
          if (hasV2) {
            let z = settingsSnap.data();
            fresh.club = z.club || fresh.club;
            fresh.subscription = z.subscription;
          } else if (legacy.exists()) fresh = legacy.data();
          D = fresh;
          for (let key of DATA_KEYS) {
            let q = await getDocs(collection(db, "clubs", "main", key));
            if (q.size) D[key] = q.docs.map((x) => ({ id: x.id, ...x.data() }));
            else if (hasV2) D[key] = [];
            else if (!Array.isArray(D[key])) D[key] = [];
          }
          let changed = !hasV2;
          if (!D.users?.length) {
            let adminHash = D.pinHash || (await hashPin("1234")),
              devHash = await hashPin("909090");
            D.users = [
              {
                id: "admin",
                name: "Club Admin",
                role: "admin",
                pinHash: adminHash,
                active: true,
              },
              {
                id: "developer",
                name: "CueCloud Developer",
                role: "developer",
                pinHash: devHash,
                active: true,
              },
            ];
            delete D.pinHash;
            changed = true;
          }
          if (!D.subscription) {
            D.subscription = {
              status: "active",
              end: addDays(30),
              plan: "Trial",
            };
            changed = true;
          }
          for (let key of ["reservations", "auditLogs", "stockMovements"])
            if (!Array.isArray(D[key])) {
              D[key] = [];
              changed = true;
            }
          let billingDefaults = {
            gstEnabled: true,
            gst: 18,
            discountEnabled: false,
            defaultDiscount: 0,
            maxDiscount: 20,
            upiId: "",
            payeeName: D.club.name,
            warningMinutes: 10,
            graceMinutes: 0,
            currency: "₹",
            address: "",
            phone: "",
            happyHourEnabled: false,
            happyHourName: "Happy Hour",
            happyHourStart: "16:00",
            happyHourEnd: "19:00",
            happyHourDays: [1, 2, 3, 4, 5],
            happyHourDiscount: 15,
            happyHourScope: "table",
          };
          for (let [k, v] of Object.entries(billingDefaults))
            if (D.club[k] === undefined) {
              D.club[k] = v;
              changed = true;
            }
          if (changed) await save();
          syncReady = true;
          showPin();
          onSnapshot(clubRef, (x) => {
            if (x.exists() && !saving) {
              let z = x.data();
              D.club = z.club || D.club;
              D.subscription = z.subscription || D.subscription;
              if (unlocked) render();
            }
          });
          for (let key of DATA_KEYS)
            onSnapshot(collection(db, "clubs", "main", key), (q) => {
              if (saving) return;
              D[key] = q.docs.map((x) => ({ id: x.id, ...x.data() }));
              if (key === "users" && unlocked) {
                let freshUser = D.users.find((u) => u.id === user?.id),
                  changedPin =
                    freshUser && freshUser.pinHash !== unlockedPinHash;
                if (!freshUser || !freshUser.active || changedPin) {
                  unlocked = false;
                  user = null;
                  unlockedPinHash = "";
                  pinEntry = "";
                  return showPin(
                    !freshUser || !freshUser.active
                      ? "This user was blocked."
                      : "Your PIN was changed.",
                  );
                }
              }
              if (unlocked) render();
            });
          window.addEventListener("online", () => {
            toast("Back online · synchronizing");
            render();
          });
          window.addEventListener("offline", () => {
            toast("Offline mode · changes will sync later");
            render();
          });
        } catch (e) {
          A.innerHTML =
            '<div class="login"><section class="loginbox"><h2>Firestore connection failed</h2><p>' +
            esc(e.message) +
            "</p><p>Publish the supplied Firestore rules first.</p></section></div>";
        }
      }
      boot();
    </script>
  </body>
</html>
